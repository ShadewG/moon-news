function formatDuration(ms) {
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  return m + ':' + String(s).padStart(2, '0');
}

function formatTimestamp(ms) {
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function decodeHTML(str) {
  return str.replace(/&#39;/g, "'").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') e.className = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'string') e.setAttribute('style', attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  return e;
}

  var maxViews = Math.max.apply(null, clips.map(function(c) { return c.view_count; }));
  clips.forEach(function(c) {
    items.push({ type: 'clip', data: c, relevance: Math.round((c.view_count / maxViews) * 100) });
  });
  quotes.forEach(function(q) {
    items.push({ type: 'quote', data: q, relevance: q.relevance_score });
  });
  tweets.forEach(function(t) {
    var maxTweetViews = Math.max.apply(null, tweets.map(function(tw) { return tw.view_count; }));
    items.push({ type: 'tweet', data: t, relevance: Math.round((t.view_count / maxTweetViews) * 90) });
  });
  // Sort by relevance descending, interleave by taking from sorted and alternating types
  items.sort(function(a, b) { return b.relevance - a.relevance; });
  return items;
}

function playClip(clip, startSec) {
  currentPlaying = clip;
  var mp = document.getElementById('miniPlayer');
  mp.classList.add('visible');
  document.getElementById('mpThumb').src = 'https://i.ytimg.com/vi/' + clip.external_id + '/hqdefault.jpg';
  document.getElementById('mpTitle').textContent = decodeHTML(clip.title);
  document.getElementById('mpChannel').textContent = clip.channel_or_contributor;

  document.getElementById('mpPlayBtn').onclick = function() {
    openVideoModal(clip.external_id, startSec || 0);
  };
}

function openVideoModal(externalId, startSec) {
  var modal = document.getElementById('videoModal');
  var content = document.getElementById('modalContent');
  // Remove old iframe
  var old = content.querySelector('iframe');
  if (old) old.remove();
  var iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/' + externalId + '?autoplay=1' + (startSec ? '&start=' + startSec : '');
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  content.appendChild(iframe);
  modal.classList.add('visible');
}

function closeModal() {
  var modal = document.getElementById('videoModal');
  modal.classList.remove('visible');
  var iframe = document.getElementById('modalContent').querySelector('iframe');
  if (iframe) iframe.remove();
}

function renderFeed() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var feed = document.getElementById('feed');
  feed.replaceChildren();
  var items = buildFeedItems();

  items.forEach(function(item) {
    if (currentFilter === 'youtube' && item.type !== 'clip') return;
    if (currentFilter === 'twitter' && item.type !== 'tweet') return;
    if (currentFilter === 'quotes' && item.type !== 'quote') return;

    if (item.type === 'clip') {
      var c = item.data;
      var title = decodeHTML(c.title);
      if (search && !title.toLowerCase().includes(search) && !c.channel_or_contributor.toLowerCase().includes(search)) return;

      var card = el('div', { className: 'clip-card', onClick: function() { playClip(c); } });
      var thumbRow = el('div', { className: 'thumb-row' }, [
        el('img', { src: 'https://i.ytimg.com/vi/' + c.external_id + '/hqdefault.jpg', alt: '' }),
        el('span', { className: 'duration-badge' }, formatDuration(c.duration_ms))
      ]);
      var body = el('div', { className: 'card-body' });
      body.appendChild(el('div', { className: 'card-title' }, title));
      var meta = el('div', { className: 'card-meta' }, [
        el('span', { className: 'channel' }, c.channel_or_contributor),
        el('span', { className: 'badge-sm badge-views' }, c.view_count.toLocaleString() + ' views')
      ]);
      if (c.quote_count > 0) {
        meta.appendChild(el('span', { className: 'badge-sm badge-quotes' }, c.quote_count + ' quotes'));
      }
      body.appendChild(meta);
      card.appendChild(thumbRow);
      card.appendChild(body);
      feed.appendChild(card);

    } else if (item.type === 'quote') {
      var q = item.data;
      if (search && !q.quote_text.toLowerCase().includes(search) && !(q.speaker || '').toLowerCase().includes(search) && !q.video_title.toLowerCase().includes(search)) return;

      var qcard = el('div', { className: 'quote-card' });
      var header = el('div', { className: 'quote-header' });
      header.appendChild(el('span', { className: 'speaker' }, q.speaker || 'Unknown Speaker'));
      var ts = el('span', { className: 'timestamp', onClick: function() {
        var clip = clips.find(function(cc) { return cc.external_id === q.external_id; });
        if (clip) playClip(clip, Math.floor(q.start_ms / 1000));
        openVideoModal(q.external_id, Math.floor(q.start_ms / 1000));
      }}, formatTimestamp(q.start_ms));
      header.appendChild(ts);
      qcard.appendChild(header);
      qcard.appendChild(el('div', { className: 'text' }, '"' + q.quote_text + '"'));
      var source = el('div', { className: 'source' }, [
        document.createTextNode(decodeHTML(q.video_title) + ' - ' + q.channel_or_contributor),
      ]);
      source.appendChild(el('span', { className: 'relevance' }, 'Score: ' + q.relevance_score));
      qcard.appendChild(source);
      feed.appendChild(qcard);

    } else if (item.type === 'tweet') {
      var t = item.data;
      if (search && !t.title.toLowerCase().includes(search) && !t.channel_or_contributor.toLowerCase().includes(search)) return;

      var tcard = el('div', { className: 'tweet-card', onClick: function() { window.open(t.source_url, '_blank'); }});
      tcard.appendChild(el('div', { className: 'tweet-author' }, t.channel_or_contributor));
      tcard.appendChild(el('div', { className: 'tweet-text' }, t.title));
      tcard.appendChild(el('div', { className: 'tweet-meta' }, [
        el('span', null, t.view_count.toLocaleString() + ' views'),
        el('span', { className: 'badge-sm badge-twitter' }, 'Twitter / X')
      ]));
      feed.appendChild(tcard);
    }
  });
}

// Events
document.querySelectorAll('.filter-pills button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-pills button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderFeed();
  });
});

document.getElementById('searchInput').addEventListener('input', renderFeed);

document.getElementById('mpClose').addEventListener('click', function() {
  document.getElementById('miniPlayer').classList.remove('visible');
  currentPlaying = null;
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('videoModal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

renderFeed();
})();
</script>
</body>
</html>
