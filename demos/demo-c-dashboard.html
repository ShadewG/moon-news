<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal C — Command Center</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #09090b; color: #d4d4d8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid #27272a; background: #0c0c0f; flex-shrink: 0; }
  .header h1 { font-size: 16px; font-weight: 600; color: #fafafa; }
  .header .badge { background: #7c3aed; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 9999px; margin-left: 10px; }
  .header .subtitle { font-size: 12px; color: #71717a; margin-left: 12px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; flex: 1; gap: 1px; background: #27272a; overflow: hidden; }

  .quadrant { background: #09090b; display: flex; flex-direction: column; overflow: hidden; }
  .q-header { padding: 10px 14px; border-bottom: 1px solid #27272a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: #0c0c0f; }
  .q-header h2 { font-size: 13px; font-weight: 600; color: #e4e4e7; }
  .q-header .q-count { font-size: 11px; color: #71717a; }
  .q-body { flex: 1; overflow-y: auto; padding: 10px; }

  /* Library grid */
  .lib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .lib-card { background: #18181b; border: 1px solid #27272a; border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .lib-card:hover { border-color: #7c3aed; }
  .lib-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .lib-card .lc-body { padding: 6px 8px; }
  .lib-card .lc-title { font-size: 10px; color: #e4e4e7; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .lib-card .lc-meta { font-size: 9px; color: #71717a; margin-top: 3px; }

  /* Quotes feed */
  .qf-item { background: #18181b; border-left: 3px solid #f59e0b; border-radius: 0 6px 6px 0; padding: 10px 12px; margin-bottom: 8px; }
  .qf-item .qf-speaker { font-size: 11px; color: #f59e0b; font-weight: 600; }
  .qf-item .qf-ts { font-size: 10px; color: #7c3aed; font-family: monospace; cursor: pointer; float: right; }
  .qf-item .qf-ts:hover { text-decoration: underline; }
  .qf-item .qf-text { font-size: 12px; color: #d4d4d8; line-height: 1.5; margin-top: 4px; }
  .qf-item .qf-source { font-size: 10px; color: #71717a; margin-top: 4px; }

  /* Search panel */
  .search-input { width: 100%; background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 8px 10px; color: #d4d4d8; font-size: 13px; outline: none; margin-bottom: 10px; }
  .search-input:focus { border-color: #7c3aed; }
  .sr-item { display: flex; gap: 8px; padding: 8px; background: #18181b; border-radius: 6px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
  .sr-item:hover { border-color: #27272a; }
  .sr-item img { width: 60px; height: 34px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
  .sr-item .sr-info { flex: 1; min-width: 0; }
  .sr-item .sr-title { font-size: 11px; color: #e4e4e7; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .sr-item .sr-meta { font-size: 9px; color: #71717a; margin-top: 2px; }

  /* Chat panel */
  .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
  .chat-msg { margin-bottom: 10px; }
  .chat-msg.user { text-align: right; }
  .chat-msg .bubble { display: inline-block; max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; }
  .chat-msg.user .bubble { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.ai .bubble { background: #18181b; color: #d4d4d8; border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 6px; padding: 10px; border-top: 1px solid #27272a; flex-shrink: 0; }
  .chat-input-row input { flex: 1; background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 8px 10px; color: #d4d4d8; font-size: 12px; outline: none; }
  .chat-input-row input:focus { border-color: #7c3aed; }
  .chat-input-row button { background: #7c3aed; border: none; color: #fff; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }

  /* Video modal */
  .video-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 300; display: none; align-items: center; justify-content: center; }
  .video-modal.visible { display: flex; }
  .video-modal .modal-content { width: 80%; max-width: 750px; aspect-ratio: 16/9; position: relative; }
  .video-modal iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
  .video-modal .modal-close { position: absolute; top: -36px; right: 0; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
</style>

function formatDuration(ms) {
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  return m + ':' + String(s).padStart(2, '0');
}

function formatTimestamp(ms) {
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function decodeHTML(str) {
  return str.replace(/&#39;/g, "'").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') e.className = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  return e;
}

function openVideo(externalId, startSec) {
  var modal = document.getElementById('videoModal');
  var content = document.getElementById('modalContent');
  var old = content.querySelector('iframe');
  if (old) old.remove();
  var iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/' + externalId + '?autoplay=1' + (startSec ? '&start=' + startSec : '');
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  content.appendChild(iframe);
  modal.classList.add('visible');
}

function closeModal() {
  var modal = document.getElementById('videoModal');
  modal.classList.remove('visible');
  var iframe = document.getElementById('modalContent').querySelector('iframe');
  if (iframe) iframe.remove();
}

// Library grid
function renderLibrary() {
  var body = document.getElementById('libBody');
  body.replaceChildren();
  document.getElementById('libCount').textContent = clips.length + ' clips';
  var grid = el('div', { className: 'lib-grid' });
  clips.forEach(function(c) {
    var card = el('div', { className: 'lib-card', onClick: function() { openVideo(c.external_id); } });
    card.appendChild(el('img', { src: 'https://i.ytimg.com/vi/' + c.external_id + '/hqdefault.jpg', alt: '' }));
    var b = el('div', { className: 'lc-body' });
    b.appendChild(el('div', { className: 'lc-title' }, decodeHTML(c.title)));
    b.appendChild(el('div', { className: 'lc-meta' }, c.view_count.toLocaleString() + ' views | ' + formatDuration(c.duration_ms)));
    card.appendChild(b);
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

// Quotes feed
function renderQuotes() {
  var body = document.getElementById('quotesBody');
  body.replaceChildren();
  document.getElementById('quotesCount').textContent = quotes.length + ' quotes';
  quotes.forEach(function(q) {
    var item = el('div', { className: 'qf-item' });
    var ts = el('span', { className: 'qf-ts', onClick: function() { openVideo(q.external_id, Math.floor(q.start_ms / 1000)); } }, formatTimestamp(q.start_ms));
    item.appendChild(ts);
    item.appendChild(el('div', { className: 'qf-speaker' }, q.speaker || 'Unknown'));
    item.appendChild(el('div', { className: 'qf-text' }, '"' + q.quote_text + '"'));
    item.appendChild(el('div', { className: 'qf-source' }, decodeHTML(q.video_title) + ' - ' + q.channel_or_contributor));
    body.appendChild(item);
  });
}

// Search
function renderSearch() {
  var query = document.getElementById('dashSearch').value.toLowerCase();
  var results = document.getElementById('searchResults');
  results.replaceChildren();
  if (!query) {
    results.appendChild(el('div', { style: 'color:#71717a;font-size:12px;text-align:center;padding:30px 0;' }, 'Type to search across clips, quotes, and tweets'));
    return;
  }
  var found = 0;
  clips.forEach(function(c) {
    var title = decodeHTML(c.title);
    if (title.toLowerCase().includes(query) || c.channel_or_contributor.toLowerCase().includes(query)) {
      found++;
      var item = el('div', { className: 'sr-item', onClick: function() { openVideo(c.external_id); } }, [
        el('img', { src: 'https://i.ytimg.com/vi/' + c.external_id + '/hqdefault.jpg', alt: '' }),
        el('div', { className: 'sr-info' }, [
          el('div', { className: 'sr-title' }, title),
          el('div', { className: 'sr-meta' }, c.channel_or_contributor + ' | ' + c.view_count.toLocaleString() + ' views')
        ])
      ]);
      results.appendChild(item);
    }
  });
  quotes.forEach(function(q) {
    if (q.quote_text.toLowerCase().includes(query) || (q.speaker || '').toLowerCase().includes(query)) {
      found++;
      var item = el('div', { className: 'qf-item', style: 'margin-bottom:6px;padding:8px 10px;' });
      item.appendChild(el('div', { className: 'qf-speaker' }, (q.speaker || 'Unknown') + ' - ' + formatTimestamp(q.start_ms)));
      var text = el('div', { className: 'qf-text', style: 'font-size:11px;cursor:pointer;', onClick: function() { openVideo(q.external_id, Math.floor(q.start_ms / 1000)); } }, '"' + q.quote_text + '"');
      item.appendChild(text);
      results.appendChild(item);
    }
  });
  if (found === 0) {
    results.appendChild(el('div', { style: 'color:#71717a;font-size:12px;text-align:center;padding:30px 0;' }, 'No results found'));
  }
}

// Chat
var chatResponses = [
  "Based on the research library, the most discussed theme is CIA whistleblower retaliation, particularly around John Kiriakou's case. Multiple clips and quotes reference the tension between institutional secrecy and accountability.",
  "The data shows 20 clips with a combined view count over 170 million. The top-viewed clip is the Joe Rogan interview with Edward Snowden at nearly 40 million views.",
  "Key speakers across the quotes include John Kiriakou (most frequently quoted), Andrew Bamante, and several unnamed CIA officers. The quotes primarily focus on torture programs, surveillance, and institutional cover-ups.",
  "Looking at the quote relevance scores, the highest-rated quotes cluster around themes of torture program exposure, whistleblower protection failures, and CIA surveillance capabilities."
];
var chatIdx = 0;

function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  var messages = document.getElementById('chatMessages');

  var userMsg = el('div', { className: 'chat-msg user' });
  userMsg.appendChild(el('div', { className: 'bubble' }, msg));
  messages.appendChild(userMsg);

  input.value = '';

  setTimeout(function() {
    var aiMsg = el('div', { className: 'chat-msg ai' });
    aiMsg.appendChild(el('div', { className: 'bubble' }, chatResponses[chatIdx % chatResponses.length]));
    messages.appendChild(aiMsg);
    messages.scrollTop = messages.scrollHeight;
    chatIdx++;
  }, 500);

  messages.scrollTop = messages.scrollHeight;
}

// Events
document.getElementById('dashSearch').addEventListener('input', renderSearch);
document.getElementById('chatSend').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendChat();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('videoModal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

renderLibrary();
renderQuotes();
renderSearch();
})();
</script>
