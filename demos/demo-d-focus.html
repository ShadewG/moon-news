<html lang="en">
<head>

<title>Proposal D — Focus Mode</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #09090b; color: #d4d4d8; min-height: 100vh; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid #27272a; background: #0c0c0f; position: sticky; top: 0; z-index: 50; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 16px; font-weight: 600; color: #fafafa; }
  .header .badge { background: #7c3aed; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 9999px; }
  .header .subtitle { font-size: 12px; color: #71717a; }
  .search-trigger { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 6px 14px; color: #71717a; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .search-trigger:hover { border-color: #3f3f46; }
  .search-trigger kbd { background: #27272a; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-family: monospace; }

  .main { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }

  /* Navigation arrows */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .nav-btn { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 8px 18px; color: #d4d4d8; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .nav-btn:hover { border-color: #7c3aed; color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; border-color: #27272a; color: #71717a; }
  .nav-btn svg { width: 14px; height: 14px; fill: currentColor; }
  .clip-counter { font-size: 12px; color: #71717a; }

  /* Player */
  .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 24px; cursor: pointer; }
  .player-wrapper img { width: 100%; height: 100%; object-fit: cover; }
  .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 72px; height: 72px; background: rgba(124,58,237,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
  .play-btn:hover { transform: translate(-50%, -50%) scale(1.1); }
  .play-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }

  /* Title & meta */
  .video-title { font-size: 22px; font-weight: 600; color: #fafafa; line-height: 1.3; margin-bottom: 10px; }
  .video-meta { display: flex; gap: 16px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }
  .video-meta span { font-size: 13px; color: #71717a; }
  .video-meta .channel { color: #a1a1aa; font-weight: 500; }
  .meta-badge { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 500; }
  .meta-badge.views { background: #172554; color: #60a5fa; }
  .meta-badge.quotes { background: #422006; color: #f59e0b; }
  .meta-badge.transcript { background: #052e16; color: #22c55e; }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #27272a; margin-bottom: 24px; }
  .tab-bar button { background: none; border: none; border-bottom: 2px solid transparent; color: #71717a; font-size: 14px; padding: 10px 20px; cursor: pointer; transition: all 0.15s; }
  .tab-bar button:hover { color: #d4d4d8; }
  .tab-bar button.active { color: #7c3aed; border-bottom-color: #7c3aed; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Quote cards */
  .quote-card { background: #18181b; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; padding: 16px 20px; margin-bottom: 12px; }
  .quote-card .q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .quote-card .speaker { font-size: 13px; color: #f59e0b; font-weight: 600; }
  .quote-card .timestamp { font-size: 12px; color: #7c3aed; cursor: pointer; font-family: monospace; padding: 3px 8px; background: #1e1b4b; border-radius: 4px; }

  .quote-card .text { font-size: 15px; color: #e4e4e7; line-height: 1.7; }
  .quote-card .context { font-size: 12px; color: #71717a; margin-top: 8px; font-style: italic; }

  /* Transcript */
  .transcript-placeholder { color: #71717a; font-size: 14px; text-align: center; padding: 40px 0; }

  /* Notes */
  .notes-area textarea { width: 100%; min-height: 200px; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 14px; color: #d4d4d8; font-size: 14px; line-height: 1.6; resize: vertical; outline: none; font-family: inherit; }
  .notes-area textarea:focus { border-color: #7c3aed; }
  .notes-area textarea::placeholder { color: #52525b; }

  /* AI Tab */
  .ai-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
  .ai-input-area input { flex: 1; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 14px; color: #d4d4d8; font-size: 14px; outline: none; }
  .ai-input-area input:focus { border-color: #7c3aed; }
  .ai-input-area button { background: #7c3aed; border: none; color: #fff; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .ai-response { background: #18181b; border-radius: 8px; padding: 18px; font-size: 14px; line-height: 1.7; color: #a1a1aa; }

  /* Spotlight search overlay */
  .spotlight { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 500; display: none; justify-content: center; padding-top: 15vh; }
  .spotlight.visible { display: flex; }

  .spotlight-box input::placeholder { color: #52525b; }
  .spotlight-results { max-height: 400px; overflow-y: auto; }
  .spot-item { display: flex; gap: 12px; padding: 10px 16px; cursor: pointer; align-items: center; border-bottom: 1px solid #1a1a1e; }

  .spot-item img { width: 64px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .spot-item .spot-info { flex: 1; min-width: 0; }
  .spot-item .spot-title { font-size: 13px; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spot-item .spot-meta { font-size: 11px; color: #71717a; margin-top: 2px; }
  .spot-item .spot-type { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
  .spot-type-clip { background: #172554; color: #60a5fa; }
  .spot-type-quote { background: #422006; color: #f59e0b; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

function formatDuration(ms) {
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  return m + ':' + String(s).padStart(2, '0');
}

function formatTimestamp(ms) {
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function decodeHTML(str) {
  return str.replace(/&#39;/g, "'").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') e.className = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'string') e.setAttribute('style', attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  return e;
}

function jumpToTime(externalId, startMs) {
  var wrapper = document.getElementById('playerWrapper');
  var thumb = document.getElementById('playerThumb');
  var playBtn = document.getElementById('playBtn');
  thumb.style.display = 'none';
  playBtn.style.display = 'none';
  var old = wrapper.querySelector('iframe');
  if (old) old.remove();
  var seconds = Math.floor(startMs / 1000);
  var iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/' + externalId + '?autoplay=1&start=' + seconds;
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  wrapper.appendChild(iframe);
}

function loadClip(index) {
  // Save notes for current clip
  var ta = document.getElementById('notesTextarea');
  if (ta && clips[currentIndex]) {
    notesMap[clips[currentIndex].id] = ta.value;
  }

  currentIndex = index;
  var clip = clips[index];

  // Player
  var wrapper = document.getElementById('playerWrapper');
  var thumb = document.getElementById('playerThumb');
  var playBtn = document.getElementById('playBtn');
  var old = wrapper.querySelector('iframe');
  if (old) old.remove();
  thumb.src = 'https://i.ytimg.com/vi/' + clip.external_id + '/hqdefault.jpg';
  thumb.style.display = 'block';
  playBtn.style.display = 'flex';

  wrapper.onclick = function() {
    thumb.style.display = 'none';
    playBtn.style.display = 'none';
    var iframe = document.createElement('iframe');
    iframe.src = 'https://www.youtube.com/embed/' + clip.external_id + '?autoplay=1';
    iframe.allow = 'autoplay; encrypted-media';
    iframe.allowFullscreen = true;
    wrapper.appendChild(iframe);
    wrapper.onclick = null;
  };

  // Title & meta
  document.getElementById('videoTitle').textContent = decodeHTML(clip.title);
  var meta = document.getElementById('videoMeta');
  meta.replaceChildren();
  meta.appendChild(el('span', { className: 'channel' }, clip.channel_or_contributor));
  meta.appendChild(el('span', null, formatDuration(clip.duration_ms)));
  meta.appendChild(el('span', { className: 'meta-badge views' }, clip.view_count.toLocaleString() + ' views'));
  if (clip.quote_count > 0) {
    meta.appendChild(el('span', { className: 'meta-badge quotes' }, clip.quote_count + ' quotes'));
  }
  if (clip.has_transcript) {
    meta.appendChild(el('span', { className: 'meta-badge transcript' }, 'Transcript'));
  }

  // Counter
  document.getElementById('clipCounter').textContent = (index + 1) + ' / ' + clips.length;

  // Nav buttons
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === clips.length - 1);

  // Quotes tab
  var clipQuotes = quotes.filter(function(q) { return q.clip_id === clip.id || q.external_id === clip.external_id; });
  var quotesPane = document.getElementById('tab-quotes');
  quotesPane.replaceChildren();
  if (clipQuotes.length === 0) {
    quotesPane.appendChild(el('div', { style: 'color:#71717a;font-size:14px;text-align:center;padding:40px 0;' }, 'No quotes available for this clip.'));
  } else {
    clipQuotes.forEach(function(q) {
      var card = el('div', { className: 'quote-card' });
      var top = el('div', { className: 'q-top' });
      top.appendChild(el('span', { className: 'speaker' }, q.speaker || 'Unknown Speaker'));
      var eid = q.external_id || clip.external_id;
      top.appendChild(el('span', { className: 'timestamp', onClick: function() { jumpToTime(eid, q.start_ms); } }, formatTimestamp(q.start_ms)));
      card.appendChild(top);
      card.appendChild(el('div', { className: 'text' }, '"' + q.quote_text + '"'));
      if (q.context) {
        card.appendChild(el('div', { className: 'context' }, q.context));
      }
      quotesPane.appendChild(card);
    });
  }

  // Restore notes
  document.getElementById('notesTextarea').value = notesMap[clip.id] || '';
}

// Nav
document.getElementById('prevBtn').addEventListener('click', function() {
  if (currentIndex > 0) loadClip(currentIndex - 1);
});
document.getElementById('nextBtn').addEventListener('click', function() {
  if (currentIndex < clips.length - 1) loadClip(currentIndex + 1);
});

// Tabs
document.querySelectorAll('#tabBar button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#tabBar button').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// AI
document.getElementById('aiAskBtn').addEventListener('click', function() {
  var q = document.getElementById('aiQuestion').value;
  if (!q) return;
  var clip = clips[currentIndex];
  var resp = document.getElementById('aiResponse');
  resp.replaceChildren();
  resp.appendChild(el('strong', null, 'Q: ' + q));
  resp.appendChild(document.createElement('br'));
  resp.appendChild(document.createElement('br'));
  resp.appendChild(document.createTextNode('Analyzing "' + decodeHTML(clip.title) + '": This clip explores themes of intelligence operations and institutional accountability. Key discussion points include surveillance programs, whistleblower experiences, and the balance between national security imperatives and civil liberties. The speaker provides first-hand accounts of operational realities within intelligence agencies.'));
  resp.appendChild(document.createElement('br'));
  resp.appendChild(document.createElement('br'));
  var em = document.createElement('em');
  em.style.color = '#71717a';
  em.textContent = 'This is a mock AI response for demonstration purposes.';
  resp.appendChild(em);
  document.getElementById('aiQuestion').value = '';
});

// Spotlight search
var spotlight = document.getElementById('spotlight');
var spotInput = document.getElementById('spotlightInput');

function openSpotlight() {
  spotlight.classList.add('visible');
  spotInput.value = '';
  spotInput.focus();
  renderSpotlight('');
}

function closeSpotlight() {
  spotlight.classList.remove('visible');
}

function renderSpotlight(query) {
  var results = document.getElementById('spotlightResults');
  results.replaceChildren();
  var q = query.toLowerCase();

  clips.forEach(function(c, idx) {
    var title = decodeHTML(c.title);
    if (q && !title.toLowerCase().includes(q) && !c.channel_or_contributor.toLowerCase().includes(q)) return;
    var item = el('div', { className: 'spot-item', onClick: function() { closeSpotlight(); loadClip(idx); } }, [
      el('img', { src: 'https://i.ytimg.com/vi/' + c.external_id + '/hqdefault.jpg', alt: '' }),
      el('div', { className: 'spot-info' }, [
        el('div', { className: 'spot-title' }, title),
        el('div', { className: 'spot-meta' }, c.channel_or_contributor + ' | ' + c.view_count.toLocaleString() + ' views')
      ]),
      el('span', { className: 'spot-type spot-type-clip' }, 'Clip')
    ]);
    results.appendChild(item);
  });

  quotes.forEach(function(quote) {
    if (q && !quote.quote_text.toLowerCase().includes(q) && !(quote.speaker || '').toLowerCase().includes(q)) return;
    var clipIdx = clips.findIndex(function(c) { return c.external_id === quote.external_id; });
    var item = el('div', { className: 'spot-item', onClick: function() {
      closeSpotlight();
      if (clipIdx >= 0) loadClip(clipIdx);
      jumpToTime(quote.external_id, quote.start_ms);
    }}, [
      el('div', { className: 'spot-info', style: 'padding-left:8px;' }, [
        el('div', { className: 'spot-title' }, '"' + quote.quote_text.substring(0, 80) + '..."'),
        el('div', { className: 'spot-meta' }, (quote.speaker || 'Unknown') + ' | ' + formatTimestamp(quote.start_ms))
      ]),
      el('span', { className: 'spot-type spot-type-quote' }, 'Quote')
    ]);
    results.appendChild(item);
  });

  if (results.children.length === 0) {
    results.appendChild(el('div', { style: 'color:#71717a;font-size:13px;text-align:center;padding:30px 0;' }, 'No results found'));
  }
}

document.getElementById('searchTrigger').addEventListener('click', openSpotlight);

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (spotlight.classList.contains('visible')) {
      closeSpotlight();
    } else {
      openSpotlight();
    }
  }
  if (e.key === 'Escape' && spotlight.classList.contains('visible')) {
    closeSpotlight();
  }
  // Arrow keys for prev/next
  if (!spotlight.classList.contains('visible')) {
    if (e.key === 'ArrowLeft' && currentIndex > 0) loadClip(currentIndex - 1);
    if (e.key === 'ArrowRight' && currentIndex < clips.length - 1) loadClip(currentIndex + 1);
  }
});

spotlight.addEventListener('click', function(e) {
  if (e.target === spotlight) closeSpotlight();
});

spotInput.addEventListener('input', function() {
  renderSpotlight(spotInput.value);
});

// Init
loadClip(0);
})();
</script>
</body>
</html>
